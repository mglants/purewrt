name: reusable build

# Reusable build of the PureWRT packages via the OpenWrt SDK action.
# Called by build.yml (unsigned, manual) and release.yml (signed, on tag).
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label(s) for the matrix jobs.
        type: string
        default: ubuntu-latest
      sign:
        description: Sign packages + build the index (release).
        type: boolean
        default: false
      artifact-prefix:
        description: Artifact name prefix (publish parses feed-<branch>-<arch>).
        type: string
        default: purewrt
      packages:
        description: Space-separated feed packages to build.
        type: string
        default: mihomo-alpha zapret purewrt luci-app-purewrt
      base-ref:
        description: >-
          Git ref to build the feed from (e.g. the last v* release tag). When
          set, the checkout is pinned to it and only `overlay-paths` are taken
          from the triggering commit — so purewrt/luci build at their released
          version while rolling deps build from main. Empty = build the
          checked-out ref as-is.
        type: string
        default: ''
      overlay-paths:
        description: >-
          Space-separated paths overlaid from the triggering commit onto
          `base-ref` (the rolling dependency package dirs). Ignored when
          base-ref is empty.
        type: string
        default: ''
      matrix:
        description: JSON strategy matrix. Default = popular >=128 MB arches x branch set.
        type: string
        # Popular OpenWrt package arches for routers with >=128 MB RAM (lower-RAM /
        # niche arches omitted — the mihomo proxy needs the headroom). branches:
        # openwrt-24.10, openwrt-25.12.
        #   x86_64                    x86 / VMs
        #   aarch64_cortex-a53        mediatek/filogic (MT7981/86), qualcommax/ipq807x
        #   aarch64_cortex-a72        bcm27xx (RPi4), mvebu armada-7k/8k
        #   aarch64_cortex-a76        bcm27xx (RPi5)
        #   aarch64_generic           rockchip (NanoPi R2S/R4S/R5S), armsr
        #   arm_cortex-a7_neon-vfpv4  ipq40xx (GL.iNet, Linksys, Netgear)
        #   arm_cortex-a9_vfpv3-d16   mvebu/cortexa9 (Linksys WRT, Turris Omnia)
        #   arm_cortex-a15_neon-vfpv4 ipq806x (Netgear R7800/R7500)
        #   mips_24kc                 ath79 (TP-Link Archer, Ubiquiti)
        #   mipsel_24kc               ramips/mt7621 (Xiaomi, ZyXEL, very common)
        default: >-
          {"branch":["openwrt-24.10","openwrt-25.12"],
           "arch":["x86_64",
                   "aarch64_cortex-a53","aarch64_cortex-a72","aarch64_cortex-a76","aarch64_generic",
                   "arm_cortex-a7_neon-vfpv4","arm_cortex-a9_vfpv3-d16","arm_cortex-a15_neon-vfpv4",
                   "mips_24kc","mipsel_24kc"]}
    secrets:
      USIGN_SECRET_KEY:
        required: false
      APK_PRIVATE_KEY:
        required: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.branch }} / ${{ matrix.arch }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Pin base ref + overlay rolling deps
        # Build purewrt/luci from base-ref (the last release) but the dep
        # packages from the triggering commit, so a dep-bump publish never
        # ships unreleased purewrt. No-op when base-ref is empty.
        if: inputs.base-ref != ''
        run: |
          set -e
          echo "Pinning build tree to '${{ inputs.base-ref }}', overlaying '${{ inputs.overlay-paths }}' from ${{ github.sha }}"
          git checkout --force "${{ inputs.base-ref }}"
          git checkout "${{ github.sha }}" -- ${{ inputs.overlay-paths }}
          echo "--- overlaid tree (dep dirs from main, rest from base-ref) ---"
          git status --porcelain | head -40
      - name: Compute package list
        # ooniprobe is gated two ways:
        #   - Go 1.24: builds only on the 25.12 SDK (24.10 ships Go 1.23).
        #   - CGO on 32-bit MIPS: ooniprobe needs CGO (its syslog log-handler is
        #     //go:build cgo), which pulls runtime/cgo, whose gcc_mipsx.S won't
        #     assemble under the mips_24kc/mipsel_24kc toolchain ("invalid
        #     operands `sw $18,...'"). A heavy measurement binary doesn't fit
        #     those low-RAM 32-bit targets anyway. Skipping it also lets the
        #     rest of the feed still build+publish on MIPS (a failed ooniprobe
        #     would abort the whole arch job).
        run: |
          pkgs="${{ inputs.packages }}"
          case "${{ matrix.arch }}" in mips*) is_mips=1 ;; *) is_mips=0 ;; esac
          if [ "${{ matrix.branch }}" = "openwrt-25.12" ] && [ "$is_mips" = 0 ]; then
            pkgs="$pkgs ooniprobe"
          fi
          echo "PACKAGES=$pkgs" >> "$GITHUB_ENV"
      - uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: purewrt
          PACKAGES: ${{ env.PACKAGES }}
          NO_REFRESH_CHECK: 1
          # Verbose so a swallowed compile failure prints its real cause.
          # Drop once builds are green.
          V: sc
          INDEX: ${{ inputs.sign && '1' || '0' }}
          KEY_BUILD: ${{ inputs.sign && secrets.USIGN_SECRET_KEY || '' }}
          PRIVATE_KEY: ${{ inputs.sign && secrets.APK_PRIVATE_KEY || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.branch }}-${{ matrix.arch }}
          path: bin/packages/*/purewrt/*
          if-no-files-found: error
