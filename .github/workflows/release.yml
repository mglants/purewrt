name: release

# Tag-triggered: builds the full matrix via the OpenWrt SDK action with signing
# (INDEX + keys), publishes a GitHub Pages feed, and attaches tarballs to a
# Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.branch }} / ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [openwrt-24.10, openwrt-25.12]
        arch:
          - x86_64
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - mipsel_24kc
    steps:
      - uses: actions/checkout@v4
      - uses: openwrt/gh-action-sdk@v11
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: purewrt
          PACKAGES: mihomo-alpha zapret purewrt luci-app-purewrt
          NO_REFRESH_CHECK: 1
          INDEX: 1
          KEY_BUILD: ${{ secrets.USIGN_SECRET_KEY }}
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: feed-${{ matrix.branch }}-${{ matrix.arch }}
          path: bin/packages/*/purewrt/*
          if-no-files-found: error

  publish:
    name: publish feed + release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble feed layout
        run: |
          set -e
          mkdir -p public
          for d in artifacts/feed-*; do
            name="$(basename "$d")"               # feed-openwrt-24.10-x86_64
            rest="${name#feed-openwrt-}"          # 24.10-x86_64
            branch="${rest%%-*}"                  # 24.10
            arch="${rest#*-}"                     # x86_64 | aarch64_cortex-a53 | ...
            mkdir -p "public/$branch/$arch"
            find "$d" -type f -exec cp {} "public/$branch/$arch/" \;
          done
          cp contrib/keys/purewrt-usign.pub   public/ 2>/dev/null || echo "note: usign pub key not committed yet"
          cp contrib/keys/purewrt-apk.rsa.pub public/ 2>/dev/null || echo "note: apk pub key not committed yet"
          cp install.sh feed.sh public/ 2>/dev/null || true
          {
            echo "<!doctype html><meta charset=utf-8><title>PureWRT package feed</title>"
            echo "<h1>PureWRT package feed</h1><pre>"
            ( cd public && find . -type f \( -name '*.ipk' -o -name '*.apk' -o -name 'Packages*' -o -name 'packages.adb' \) | sort )
            echo "</pre>"
          } > public/index.html
      - name: Tarball per arch
        run: |
          mkdir -p release
          for b in public/*/; do
            branch="$(basename "$b")"
            for a in "$b"*/; do
              arch="$(basename "$a")"
              tar -czf "release/purewrt-${branch}-${arch}.tar.gz" -C "$b" "$arch"
            done
          done
          ls -1 release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: pages
        uses: actions/deploy-pages@v4
      - name: GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
