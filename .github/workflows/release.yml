name: release

# Builds the full matrix via the OpenWrt SDK action with signing (INDEX + keys)
# and publishes the GitHub Pages package feed. Two cadences share this flow:
#
#   - push to main (rolling feed): republishes the feed whenever a
#     package-affecting change lands — notably the auto-merged deps/* bumps for
#     mihomo-alpha / zapret / ooniprobe — so a dependency goes live without
#     waiting for a purewrt release. Each package carries its own PKG_VERSION/
#     PKG_RELEASE, so `apk update` only offers an upgrade for what actually
#     changed (an unchanged purewrt is re-shipped at the same version → no-op
#     for users).
#   - v* tag (purewrt release): same feed publish PLUS per-arch tarballs
#     attached to a GitHub Release with notes (the GitHub Release step below is
#     gated to tag events).
#
# A `changes` gate (below) decides whether to spin the 20-job signed matrix:
# on a v* tag or manual dispatch it always builds; on a push to main it builds
# ONLY when a bundled-dependency package changed (mihomo-alpha / zapret /
# ooniprobe / easytier). A push that only touches purewrt source or docs does NOT
# republish — purewrt ships on its v* tag, the deps roll on merge. (paths can't
# express this here: a `push.paths` filter applies to tag pushes too, and would
# wrongly skip a release tag that only bumps openwrt/purewrt/Makefile.)
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Decide whether to (re)publish the feed. Always on a tag or manual dispatch;
  # on a main push only when a bundled-dependency package changed. The build
  # itself is always the FULL feed (all packages reindexed) — this gate only
  # controls whether it runs, not what it contains.
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.decide.outputs.build }}
      # base_ref: the release tag to pin purewrt/luci to on a dep-bump publish;
      # empty means "build the triggering ref as-is" (tag/dispatch/bootstrap).
      base_ref: ${{ steps.decide.outputs.base_ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: decide
        run: |
          set -e
          echo "base_ref=" >>"$GITHUB_OUTPUT"   # default; overridden below for dep bumps
          if [ "${{ github.ref_type }}" = "tag" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "build=true" >>"$GITHUB_OUTPUT"; echo "reason: tag/dispatch → full feed from this ref"; exit 0
          fi
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git rev-parse --verify -q "$base^{commit}" >/dev/null; then
            echo "build=true" >>"$GITHUB_OUTPUT"; echo "reason: no usable diff base → build"; exit 0
          fi
          if git diff --name-only "$base" "${{ github.sha }}" | grep -qE '^openwrt/(mihomo-alpha|zapret|ooniprobe|easytier)/'; then
            echo "build=true" >>"$GITHUB_OUTPUT"
            # Pin purewrt/luci to the highest v* release tag so a dep bump can't
            # ship unreleased purewrt. No tag yet → empty (bootstrap: build main).
            tag=$(git tag -l 'v*' --sort=-v:refname | head -1)
            echo "base_ref=$tag" >>"$GITHUB_OUTPUT"
            echo "reason: bundled-dep change → publish feed, purewrt pinned to '${tag:-<none, bootstrap from main>}'"
          else
            echo "build=false" >>"$GITHUB_OUTPUT"; echo "reason: no bundled-dep change on main → skip"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.build == 'true'
    uses: ./.github/workflows/_build.yml
    with:
      sign: true
      artifact-prefix: feed
      base-ref: ${{ needs.changes.outputs.base_ref }}
      overlay-paths: 'openwrt/mihomo-alpha openwrt/zapret openwrt/ooniprobe openwrt/easytier'
    secrets: inherit

  publish:
    name: publish feed + release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Assemble feed layout
        run: |
          set -e
          mkdir -p public
          for d in artifacts/feed-*; do
            name="$(basename "$d")"               # feed-openwrt-24.10-x86_64
            rest="${name#feed-openwrt-}"          # 24.10-x86_64
            branch="${rest%%-*}"                  # 24.10
            arch="${rest#*-}"                     # x86_64 | aarch64_cortex-a53 | ...
            mkdir -p "public/$branch/$arch"
            find "$d" -type f -exec cp {} "public/$branch/$arch/" \;
          done
          cp contrib/keys/purewrt-usign.pub   public/ 2>/dev/null || echo "note: usign pub key not committed yet"
          cp contrib/keys/purewrt-apk.rsa.pub public/ 2>/dev/null || echo "note: apk pub key not committed yet"
          cp install.sh feed.sh public/ 2>/dev/null || true
      - name: Generate browsable directory indexes
        run: |
          set -e
          # GitHub Pages serves no auto directory listing, so write an index.html
          # into every directory (subdirs first, then files) with relative links.
          ( cd public
            find . -type d | while IFS= read -r d; do
              {
                rel="${d#./}"; [ "$rel" = "." ] && rel="/"
                echo "<!doctype html><meta charset=utf-8>"
                echo "<title>PureWRT feed: ${rel}</title>"
                echo "<h1>PureWRT package feed: /${rel#/}</h1><ul>"
                [ "$d" != "." ] && echo '<li><a href="../">../</a></li>'
                for e in "$d"/*/; do [ -d "$e" ] || continue; b="$(basename "$e")"; echo "<li><a href=\"$b/\">$b/</a></li>"; done
                for e in "$d"/*; do [ -f "$e" ] || continue; b="$(basename "$e")"; [ "$b" = index.html ] && continue; echo "<li><a href=\"$b\">$b</a></li>"; done
                echo "</ul>"
              } > "$d/index.html"
            done
          )
      - name: Tarball per arch
        run: |
          mkdir -p release
          for b in public/*/; do
            branch="$(basename "$b")"
            for a in "$b"*/; do
              arch="$(basename "$a")"
              tar -czf "release/purewrt-${branch}-${arch}.tar.gz" -C "$b" "$arch"
            done
          done
          ls -1 release
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - id: pages
        uses: actions/deploy-pages@v5
      - name: GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.tar.gz
          generate_release_notes: true
