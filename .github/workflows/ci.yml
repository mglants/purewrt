name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: go test + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/purewrt ./cmd/purewrt-check ./cmd/purewrt-api

  # Cheap package smoke build on ubuntu-latest (gh-action-sdk ships the toolchain
  # prebuilt). Covers x86_64 + mipsel_24kc on 25.12 so a feed/Makefile break — or
  # the mipsel build under investigation — is caught fast. Push-only to keep fork
  # PRs light. Reuses _build.yml.
  smoke-build:
    if: github.event_name == 'push'
    uses: ./.github/workflows/_build.yml
    with:
      runner: arc-runner-set-nikkix
      matrix: '{"branch":["openwrt-25.12"],"arch":["mipsel_24kc"]}'
