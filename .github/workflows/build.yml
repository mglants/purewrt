name: build

# Manual full-matrix build → unsigned .ipk/.apk artifacts (no publishing).
# Thin wrapper over the reusable _build.yml.
on:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      runner: arc-runner-set-nikkix
