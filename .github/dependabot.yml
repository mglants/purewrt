# Dependabot covers what it natively understands: the Go modules and the
# GitHub Actions used by our workflows. The bundled OpenWrt packages
# (mihomo-alpha, zapret) are pinned by git commit/tag + PKG_MIRROR_HASH in
# their Makefiles, which Dependabot has no ecosystem for — those are bumped by
# .github/workflows/update-deps.yml instead.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    ignore:
      # klauspost/compress v1.18+ requires `go 1.24` in go.mod, but the
      # OpenWrt 24.10 SDK ships Go 1.23 and builds with GOTOOLCHAIN=local, so
      # the package fails to compile there. Pin to 1.17.x until the 24.10 SDK
      # carries Go 1.24 (or 24.10 is dropped from the build matrix).
      - dependency-name: "github.com/klauspost/compress"
        versions: [">=1.18.0"]
